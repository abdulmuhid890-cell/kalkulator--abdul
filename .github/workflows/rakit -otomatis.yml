name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v3

    - name: Proses Merakit APK Otomatis (Jalur Resmi)
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer -v android debug
        repository_txt: true

    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
