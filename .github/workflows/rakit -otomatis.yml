name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    # Menggunakan server stabil jangka panjang terbaru
    runs-on: ubuntu-24.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v4

    - name: Siapkan Sistem Linux dan Python Terbaru
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Paket Pendukung Android Resmi Modern
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld openjdk-17-jdk git zip unzip patch

    - name: Instal Perakit Buildozer Versi Terbaru
      run: |
        python -m pip install --upgrade pip
        # Menggunakan versi modern agar langsung sinkron dengan mesin GitHub saat ini
        pip install --upgrade cython buildozer sh

    - name: Proses Langsung Rakit APK
      run: |
        # Langsung eksekusi rakitan tanpa hambatan sistem lama
        yes | buildozer android debug
        
    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
