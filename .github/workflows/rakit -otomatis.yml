name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v3

    - name: Siapkan Sistem Linux dan Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Paket Pendukung Android Resmi
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld openjdk-17-jdk

    - name: Instal Buildozer Stabil
      run: |
        python -m pip install --upgrade pip
        pip install Cython==0.29.36 buildozer==1.5.0

    - name: Proses Kunci Konfigurasi dan Rakit APK
      run: |
        # Hapus file lama jika ada
        rm -f buildozer.spec
        
        # TRIK AMAN: Tulis ulang file spec murni secara langsung (Anti-Meleset)
        cat << 'EOF' > buildozer.spec
        [app]
        title = Kalkulator Abdul
        package.name = kalkulatorabdul
        package.domain = org.abdul
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 0.1
        requirements = python3==3.10.12,kivy==2.2.1
        orientation = portrait
        fullscreen = 1
        android.archs = armeabi-v7a, arm64-v8a
        android.accept_sdk_license = True
        EOF
        
        # Jalankan rakitan dalam mode tenang
        yes | buildozer android debug

    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
