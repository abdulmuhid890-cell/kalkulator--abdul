name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v4

    - name: Siapkan Sistem Linux dan Python Bawaan
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Paket Pendukung Android Resmi
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld openjdk-17-jdk

    - name: Instal Buildozer Versi Terbaru (Anti-Mogok)
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade cython buildozer git+https://github.com/kivy/python-for-android.git

    - name: Proses Bersihkan Cache dan Rakit APK
      run: |
        # Bersihkan sisa rakitan lama yang bikin eror berulang
        buildozer android clean
        
        # Jalankan rakitan murni menggunakan buildozer.spec Bapak
        yes | buildozer android debug
        
    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
