name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v3

    - name: Siapkan Sistem Linux dan Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal Paket Pendukung Android Resmi
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld openjdk-17-jdk

    - name: Instal Buildozer Stabil
      run: |
        python -m pip install --upgrade pip
        pip install Cython==0.29.36 buildozer==1.5.0

    - name: Proses Bersihkan Spesifikasi dan Rakit APK
      run: |
        # Buat ulang file spesifikasi murni agar teks rusak sebelumnya hilang
        rm -f buildozer.spec
        buildozer init
        
        # Setel konfigurasi dasar yang aman dan otomatis
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/title = My Application/title = Kalkulator Abdul/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = kalkulatorabdul/' buildozer.spec
        
        # Gunakan requirements standar tanpa memaksa micro-version yang bikin crash di G14
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy/' buildozer.spec
        
        # Jalankan rakitan tenang tanpa -v
        yes | buildozer android debug

    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
