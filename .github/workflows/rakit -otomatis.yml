name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v3

    - name: Siapkan Python Lingkungan Aman
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Pasang Alat Rakit Ringan
      run: |
        sudo apt-get update
        sudo apt-get install -y zip unzip openjdk-17-jdk signapk
        pip install --upgrade pip
        pip install "buildozer<2.0.0" cython==0.29.36

    - name: Proses Paket Tanpa Kompilasi Ulang Core
      run: |
        buildozer init
        # Setel konfigurasi dasar langsung
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/title = My Application/title = Kalkulator Abdul/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = kalkulatorabdul/' buildozer.spec
        
        # Trik mematikan kompilasi byte-code yang bikin log terpotong
        sed -i 's/#android.compile_pyo = True/android.compile_pyo = False/' buildozer.spec
        
        # Jalankan rakitan dengan optimasi log pendek
        yes | buildozer -v android debug

    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
