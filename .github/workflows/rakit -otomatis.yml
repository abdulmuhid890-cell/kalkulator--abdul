name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v4

    - name: Siapkan Sistem Linux dan Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Paket Pendukung Android Resmi
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld openjdk-17-jdk

    - name: Instal Buildozer Versi Stabil
      run: |
        python -m pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    - name: Proses Bersihkan dan Rakit APK Murni
      run: |
        # Buat ulang lisensi Android SDK agar segar
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        
        # Jalankan rakitan tenang
        yes | buildozer android debug
        
    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
