name: Build APK Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Ambil Kode Python
      uses: actions/checkout@v3

    - name: Siapkan Python Stabil
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal Paket Sistem Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld

    - name: Instal Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install Cython==0.29.36 buildozer==1.5.0

    - name: Proses Merakit APK Android
      run: |
        # Jika belum ada file spec, kita buat baru
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        
        # Jalankan perintah rakit otomatis dan setujui lisensi SDK
        yes | buildozer -v android debug

    - name: Simpan Hasil File APK Matang
      uses: actions/upload-artifact@v4
      with:
        name: APK-Kalkulator-Siap-Pakai
        path: bin/*.apk
