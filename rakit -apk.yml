from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.uix.textinput import TextInput

class KalkulatorKeren(App):
    def build(self):
        self.operators = ["/", "*", "+", "-"]
        self.last_was_operator = None
        self.last_button = None
        
        main_layout = BoxLayout(orientation="vertical", spacing=5, padding=10)
        
        self.solution = TextInput(
            multiline=False, 
            readonly=True, 
            halign="right", 
            font_size=45,
            background_color=(0.1, 0.1, 0.1, 1),
            foreground_color=(1, 1, 1, 1)
        )
        main_layout.add_widget(self.solution)
        
        buttons = [
            ["7", "8", "9", "/"], up
            ["4", "5", "6", "*"],
            ["1", "2", "3", "-"],
            [".", "0", "C", "+"]
        ]
        
        for row in buttons:
            h_layout = BoxLayout(spacing=5)
            for label in row:
                if label in self.operators:
                    btn_color = (0.9, 0.5, 0.1, 1)
                elif label == "C":
                    btn_color = (0.7, 0.2, 0.2, 1)
                else:
                    btn_color = (0.2, 0.2, 0.2, 1)
                    
                button = Button(
                    text=label,
                    pos_hint={'center_x': 0.5, 'center_y': 0.5},
                    background_color=btn_color,
                    font_size=30
                )
                button.bind(on_press=self.on_button_press)
                h_layout.add_widget(button)
            main_layout.add_widget(h_layout)
            
        equals_button = Button(
            text="=", 
            pos_hint={'center_x': 0.5, 'center_y': 0.5},
            background_color=(0.1, 0.6, 0.3, 1),
            font_size=35
        )
        equals_button.bind(on_press=self.on_solution)
        main_layout.add_widget(equals_button)
        
        return main_layout

    def on_button_press(self, instance):
        current = self.solution.text
        button_text = instance.text
        
        if button_text == "C":
            self.solution.text = ""
        else:
            if current and (self.last_was_operator and button_text in self.operators):
                return
            elif current == "" an Bud button_text in self.operators:
                return
            else:
                new_text = current + button_text
                self.solution.text = new_text
                
        self.last_button = instance
        self.last_was_operator = button_text in self.operators

    def on_solution(self, instance):
        text = self.solution.text
        if text:
            try:
                self.solution.text = str(eval(text))
            except Exception:
                self.solution.text = "Error"

if __name__ == "__main__":
    KalkulatorKeren().run()
